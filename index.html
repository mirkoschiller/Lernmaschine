<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lernmaschine</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Lernmaschine</h1>
      <p>Trainiere dein eigenes Bilderkennungsmodell</p>
      <span class="version-badge">Version 1.2</span>
    </div>

    <div class="main-content">
      <!-- Schritt 1: Klassifizierung -->
      <div class="section">
        <h2><span class="step-number">1</span> Daten sammeln</h2>
        <div id="classes-container"></div>
        <div class="controls">
          <button class="btn btn-primary" id="add-class-btn">+ Klasse hinzufügen</button>
          <button class="btn btn-secondary" id="clear-data-btn">Alle Daten löschen</button>
        </div>
      </div>

      <!-- Schritt 2: Training -->
      <div class="section">
        <h2><span class="step-number">2</span> Modell trainieren</h2>
        <p id="training-info">Sammle mindestens 5 Bilder pro Klasse.</p>
        <div class="progress-bar"><div class="progress-fill" id="training-progress"></div></div>
        <div class="controls">
          <button class="btn btn-success" id="train-btn" disabled>Modell trainieren</button>
        </div>
        <div id="training-status"></div>
      </div>
    </div>

    <!-- Schritt 3: Live-Test -->
    <div class="section test-section">
      <h2><span class="step-number">3</span> Modell testen</h2>
      <div class="test-content">
        <div class="webcam-container">
          <video id="webcam" autoplay muted></video>
          <canvas id="canvas" class="hidden"></canvas>
          <div class="controls">
            <button class="btn btn-primary" id="webcam-btn">Test via Webcam</button>
            <input type="file" id="test-upload" accept="image/*" class="hidden">
            <button class="btn btn-secondary" id="test-upload-btn">Bild hochladen</button>
          </div>
          <div id="test-status"></div>
        </div>
        <div class="results-container">
          <h3>Erkennungsergebnisse</h3>
          <div id="results">
            <p class="muted-result">Trainiere erst das Modell, um Ergebnisse zu sehen.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

    <script src="app.js" defer></script>
</body>
</html>
